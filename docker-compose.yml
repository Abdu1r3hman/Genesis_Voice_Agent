# One-command run:  GROQ_API_KEY=your_key docker compose up --build
# (or put GROQ_API_KEY in a .env file next to this one)
services:
  agent:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:?set GROQ_API_KEY in your environment or a .env file}
      # optional overrides:
      # - GROQ_MODEL=llama-3.1-8b-instant
      # - USE_LLM_UNDERSTANDING=1
